<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة قيادة الإدارة - ثانوية الوحدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <script>
        // Configuration for Deployment
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3000' 
            : 'https://your-backend-on-render.onrender.com'; // Replace with your Render URL
        
        const socket = io(API_BASE_URL);
    </script>
    
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg-body: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-body); padding: 20px; color: var(--text-dark); }

        .top-navbar {
            background: #fff; padding: 15px 30px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-bottom: 4px solid var(--primary-light);
        }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff; padding: 25px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .stat-info h3 { font-size: 14px; color: var(--text-muted); }
        .stat-info .number { font-size: 32px; font-weight: 900; }

        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-container { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        .admin-controls { background: #fff; padding: 25px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .upload-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .btn { padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 14px; transition: 0.3s; }
        .btn-primary { background: var(--primary-light); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }

        /* Modal for AI Override */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:#fff; padding:30px; border-radius:20px; width:90%; max-width:800px; max-height:80vh; overflow-y:auto; }
        textarea { width: 100%; height: 300px; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: monospace; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="brand-area">
            <h1 id="schoolName">ثانوية الوحدة الإعدادية</h1>
        </div>
        <div class="nav-actions">
            <span id="currentTime"></span>
            <button class="btn btn-primary" onclick="location.href='index.html'">📱 واجهة الغياب</button>
        </div>
    </div>

    <div class="admin-controls">
        <h2>⚙️ لوحة التحكم الإدارية</h2>
        <div class="upload-group">
            <button class="btn btn-primary" onclick="document.getElementById('massarInput').click()">📁 استيراد مسار (Excel)</button>
            <button class="btn btn-primary" onclick="document.getElementById('timetableInput').click()">📅 جدول الحصص (Image)</button>
            <button class="btn btn-primary" onclick="document.getElementById('holidayInput').click()">🏝️ لائحة العطل (Image)</button>
            
            <input type="file" id="massarInput" hidden accept=".xlsx" onchange="uploadMassar(this)">
            <input type="file" id="timetableInput" hidden accept="image/*" onchange="previewVision(this, 'timetable')">
            <input type="file" id="holidayInput" hidden accept="image/*" onchange="previewVision(this, 'holidays')">
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card">
            <div class="stat-info"><h3>إجمالي الغياب (اليوم)</h3><div class="number" id="absentToday">0</div></div>
            <div style="font-size:30px">🔻</div>
        </div>
        <div class="stat-card">
            <div class="stat-info"><h3>إجمالي التأخر (اليوم)</h3><div class="number" id="lateToday">0</div></div>
            <div style="font-size:30px">🔸</div>
        </div>
        <div class="stat-card">
            <div class="stat-info"><h3>عدد التلاميذ</h3><div class="number" id="totalStudents">0</div></div>
            <div style="font-size:30px">👨‍🎓</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-container">
            <h3>📈 نشاط الغياب الأسبوعي</h3>
            <canvas id="trendChart" height="100"></canvas>
        </div>
        <div class="chart-container">
            <h3>📋 آخر النشاطات</h3>
            <div id="activityFeed" style="font-size:13px; margin-top:10px;"></div>
        </div>
    </div>

    <!-- AI Override Modal -->
    <div id="overrideModal" class="modal">
        <div class="modal-content">
            <h3>🤖 مراجعة البيانات المستخرجة من الذكاء الاصطناعي</h3>
            <p style="margin-bottom:10px; color:var(--text-muted)">يمكنك تعديل JSON أدناه قبل الحفظ النهائي في قاعدة البيانات.</p>
            <textarea id="jsonPreview"></textarea>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button class="btn" onclick="document.getElementById('overrideModal').style.display='none'">إلغاء</button>
                <button class="btn btn-success" id="saveVisionBtn">تأكيد وحفظ البيانات</button>
            </div>
        </div>
    </div>

    <script>
        let currentType = "";

        socket.on('attendance_updated', (data) => {
            console.log('Real-time update received:', data);
            fetchStats();
            fetchRecentActivity();
        });

        async function fetchStats() {
            const res = await fetch(`${API_BASE_URL}/api/admin/stats`);
            const stats = await res.json();
            document.getElementById('absentToday').textContent = stats.absentToday;
            document.getElementById('lateToday').textContent = stats.lateToday;
            document.getElementById('totalStudents').textContent = stats.totalStudents;
        }

        async function fetchRecentActivity() {
            const res = await fetch(`${API_BASE_URL}/api/admin/recent-activity`);
            const activities = await res.json();
            const feed = document.getElementById('activityFeed');
            feed.innerHTML = activities.map(a => `
                <div style="padding:10px; border-bottom:1px solid #eee">
                    <b>${a.student_name}</b> (${a.class_name}) - 
                    <span style="color:${a.status === 'Absent' ? 'red' : 'orange'}">${a.status === 'Absent' ? 'غائب' : 'متأخر'}</span>
                    <br><small style="color:gray">${a.date} | ${a.session} | ${a.subject}</small>
                </div>
            `).join('');
        }

        async function uploadMassar(input) {
            const formData = new FormData();
            formData.append('file', input.files[0]);
            const res = await fetch(`${API_BASE_URL}/api/admin/upload/massar`, { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.message);
            fetchStats();
        }

        async function previewVision(input, type) {
            currentType = type;
            const formData = new FormData();
            formData.append('image', input.files[0]);
            
            alert("⏳ جاري تحليل الصورة بواسطة الذكاء الاصطناعي... يرجى الانتظار.");
            
            const endpoint = type === 'timetable' ? `${API_BASE_URL}/api/admin/upload/timetable-preview` : `${API_BASE_URL}/api/admin/upload/holidays-preview`;
            const res = await fetch(endpoint, { method: 'POST', body: formData });
            const data = await res.json();
            
            document.getElementById('jsonPreview').value = JSON.stringify(data, null, 2);
            document.getElementById('overrideModal').style.display = 'flex';
        }

        document.getElementById('saveVisionBtn').onclick = async () => {
            const jsonData = JSON.parse(document.getElementById('jsonPreview').value);
            const endpoint = currentType === 'timetable' ? `${API_BASE_URL}/api/admin/save/timetable` : `${API_BASE_URL}/api/admin/save/holidays`;
            
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(jsonData)
            });
            
            const result = await res.json();
            alert(result.message);
            document.getElementById('overrideModal').style.display = 'none';
        };

        window.onload = () => {
            fetchStats();
            fetchRecentActivity();
            setInterval(() => {
                document.getElementById('currentTime').textContent = new Date().toLocaleString('ar-MA');
            }, 1000);
        };
    </script>
</body>
</html>
